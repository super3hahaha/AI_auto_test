- id: CUT-CORE-01
  module: 音频裁剪
  purpose: 核心路径+结果页校验
  priority: P1
  goal: 裁剪一段音频并保存，在结果页将产物重命名为「cut+完成日期时间（精确到秒）」
  precondition: >
    设备「选择音频」列表已有音频文件（真机现有多首 .mp3）；App 已启动进入首页，
    若出现评分弹窗先关闭。
  steps:
    - 首页点击「音频裁剪」入口（ll_cut）
    - 在「选择音频」列表点选第一首音频，进入「剪辑器」
    - 用起止时间步进器或拖动波形上的起止手柄，设定一段明确选区（如起 00:06、止 00:31，约 24 秒），保持「保留选中」
    - 点击右上角「保存」（take_save），在「另存为」对话框确认 格式=MP3(原始)，比特率保持默认值不手动调整
    - 点击对话框内「保存」（btn_convert）完成导出
    - 结果页点文件名旁的重命名图标（iv_rename），清空原文件名，输入 cut+完成日期时间（精确到秒，如 cut20260720_180612），点「重命名」确认
  expected:
    - 进入剪辑器后可见波形、可拖动的起止手柄，以及起止时间文案（如 00:06.8 / 00:31.0）与「已选中」标记
    - 点保存后弹出「另存为」对话框，含 格式=MP3(原始)、比特率（读当前默认值即可，不强制断言具体数值）与「保存」按钮
    - 保存完成后返回，「已保存的音频/我的铃声」列表顶部出现一个新的 .mp3 文件，时长约等于选区长度（~24 秒）
    - 重命名确认后，结果页文件名更新为 cut+YYYYMMDD_HHMMSS.mp3，MediaStore 中该文件的 _data 路径同步变更（不只是 UI 文案变了）
    - output-check（带 --expect-bitrate-kbps/--expect-suffix）核对产物真实比特率与「另存为」弹窗读到的默认值一致
      （容差 32kbps，不是断言某个写死的数值，而是"弹窗显示啥、产物就该是啥"）、真实文件后缀为 .mp3
    - 全流程无 App 进程 FATAL（logcat 崩溃扫描为空）
  category: 冒烟/核心路径
  scope: 真机执行
  notes: >
    非 debug 包，仅做黑盒断言（UI 文案 + 输出列表 + 崩溃扫描），不导 DB/SP。
    重命名对话框控件：EditText(id=file_name)、确认按钮为系统 AlertDialog 的 android:id/button1（文案「重命名」），
    取消为 android:id/button2；button1 在文本未变化时 disabled，输入的新文件名与原名不同即会 enabled。
    比特率不手动调整、不断言某个写死的数值（具体比特率会随 App 默认值变化，曾在 2.3.5I 上观察到默认
    320kbps）——但固化脚本会读 bitrate_text 当场的回显值，用 output-check --expect-bitrate-kbps 做
    ffprobe 交叉核对，验证"弹窗显示的默认值"与"产物真实比特率"一致（容差 32kbps，MediaStore 本身
    没有比特率字段查不出这个，见 tools/adbkit.py output-check），另加 --expect-suffix mp3 核对产物
    真实后缀。2026-07-22 起裁剪模块（另存为弹窗可选格式/比特率的场景）统一补上这层真实值校验；
    同日一度改为读 ffprobe stream 级 bit_rate 并把容差收紧到 8kbps（此前用 format 级会被内嵌封面图/
    ID3 开销拉偏 ~20kbps，才留了 32kbps 容差，改 stream 级后自以为已是编码器精确值）；
    2026-07-23 发现 AAC 转存场景（见 CUT-EDGE-02/BUG-CUT-EDGE-02）即便读 stream 级 bit_rate，
    真实值相对目标值仍有 ~20+kbps 的正常编码器波动，8kbps 过紧会把正常波动误判为缺陷，
    故放宽回 32kbps（全格式统一，见 docs/decisions.md）。
  frozen_script: apps/MP3Cutter/flows/flow_cut_save.sh
