# 单条用例的字段模板（下划线开头的文件不会被 compile_cases 汇编）。
# 一个 .yaml 里可以是单条（映射）或多条（列表）。

- id: MODULE-CASE-01          # 稳定ID：模块前缀-序号，全局唯一（示例见 cases/CUT-CORE-01.yaml）
  module: 示例模块              # 所属模块
  purpose: 核心路径            # 测试目的（可选，默认取 module）
  priority: P0                 # P0>P1>P2>P3，决定执行顺序
  goal: 一句话测试目标（必填）  # oracle 的方向
  precondition: 起点状态，例如"全新启动，已有一条初始数据"
  steps:                       # 意图级步骤，不写坐标（坐标执行时读控件树算）
    - 第一步意图
    - 第二步意图
  expected:                    # 可观察、可判定的预期（黑盒可见的信号）
    - 界面出现某可见文案/控件
    - 输出目录新增某文件
    - 全程无 App 进程 FATAL
  category: 冒烟/核心路径       # 测试分类（可选）
  scope: 真机执行               # 执行范围（可选）
  notes: 备注（可选，如"首启有评分弹窗先关"）
  frozen_script: flows/flow_xxx.sh  # 可选。路径已探通且稳定通过后才填，主循环选到
    # 这条用例时改跑脚本、不再逐屏感知；没固化就别填这个字段（留空=走主循环）
