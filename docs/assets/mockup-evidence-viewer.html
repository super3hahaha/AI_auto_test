<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>证据查看器界面 mockup — AI+ADB 测试台桌面壳</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<style>
  :root{
    --surface-0:#f5f4ef; --surface-1:#f1efe8; --surface-2:#ffffff;
    --text-primary:#1a1a18; --text-secondary:#5f5e5a; --text-muted:#96948c;
    --text-accent:#185fa5; --text-success:#0f6e56; --text-warning:#854f0b;
    --bg-accent:#e6f1fb; --bg-success:#e1f5ee;
    --border:rgba(0,0,0,.12); --border-strong:rgba(0,0,0,.22); --border-accent:#378add;
    --radius:8px;
    --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --surface-0:#1c1c1a; --surface-1:#26262b; --surface-2:#33322f;
      --text-primary:#f2f0ea; --text-secondary:#b4b2a9; --text-muted:#888780;
      --text-accent:#85b7eb; --text-success:#5dcaa5; --text-warning:#ef9f27;
      --bg-accent:#0c447c; --bg-success:#085041;
      --border:rgba(255,255,255,.14); --border-strong:rgba(255,255,255,.26); --border-accent:#378add;
    }
  }
  body{margin:0;background:var(--surface-0);color:var(--text-primary);font-family:var(--font-sans);
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;box-sizing:border-box;}
  .wrap{width:100%;max-width:1040px;}
  .cap{font-size:13px;color:var(--text-muted);margin:0 0 10px 4px;}
  input[type=checkbox]{accent-color:var(--border-accent);}
</style>
</head>
<body>
<div class="wrap">
<p class="cap">证据查看器（模块④）界面示意 · AI+ADB 测试台桌面壳 · 见 docs/desktop-app-prd.md</p>
<div style="background: var(--surface-1); border-radius: 12px; padding: 10px; display: flex; gap: 10px; min-height: 460px; font-family: var(--font-sans);">

  <div style="width: 92px; flex-shrink: 0; display: flex; flex-direction: column; gap: 2px;">
    <div style="font-size: 12px; color: var(--text-muted); padding: 6px 8px;">测试台</div>
    <div style="display:flex; align-items:center; gap:7px; padding:7px 8px; border-radius: var(--radius); color: var(--text-secondary); font-size:13px;"><i class="ti ti-layout-dashboard" aria-hidden="true"></i>概览</div>
    <div style="display:flex; align-items:center; gap:7px; padding:7px 8px; border-radius: var(--radius); color: var(--text-secondary); font-size:13px;"><i class="ti ti-device-mobile" aria-hidden="true"></i>设备</div>
    <div style="display:flex; align-items:center; gap:7px; padding:7px 8px; border-radius: var(--radius); color: var(--text-secondary); font-size:13px;"><i class="ti ti-player-play" aria-hidden="true"></i>执行台</div>
    <div style="display:flex; align-items:center; gap:7px; padding:7px 8px; border-radius: var(--radius); background: var(--bg-accent); color: var(--text-accent); font-size:13px;"><i class="ti ti-photo" aria-hidden="true"></i>证据</div>
    <div style="display:flex; align-items:center; gap:7px; padding:7px 8px; border-radius: var(--radius); color: var(--text-secondary); font-size:13px;"><i class="ti ti-file-export" aria-hidden="true"></i>报告</div>
    <div style="display:flex; align-items:center; gap:7px; padding:7px 8px; border-radius: var(--radius); color: var(--text-secondary); font-size:13px;"><i class="ti ti-table" aria-hidden="true"></i>看板</div>
  </div>

  <div style="width: 150px; flex-shrink: 0; background: var(--surface-2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 8px; display:flex; flex-direction:column; gap:2px;">
    <div style="font-size: 11px; color: var(--text-muted); padding: 2px 4px 6px;">CUT-CORE-01</div>
    <div style="font-size:12px; padding:5px 6px; color: var(--text-secondary); display:flex; justify-content:space-between;">01-home <span style="color:var(--text-muted)">img</span></div>
    <div style="font-size:12px; padding:5px 6px; color: var(--text-secondary); display:flex; justify-content:space-between;">02-picker <span style="color:var(--text-muted)">img</span></div>
    <div style="font-size:12px; padding:5px 6px; border-radius:var(--radius); background: var(--bg-accent); color: var(--text-accent); display:flex; justify-content:space-between;">03-editor <span>★</span></div>
    <div style="font-size:12px; padding:5px 6px; color: var(--text-secondary); display:flex; justify-content:space-between;">04-saveas <span style="color:var(--text-muted)">img</span></div>
    <div style="font-size:12px; padding:5px 6px; color: var(--text-secondary); display:flex; justify-content:space-between;">05-result <span style="color:var(--text-warning)">★</span></div>
    <div style="font-size:12px; padding:5px 6px; color: var(--text-secondary); display:flex; justify-content:space-between;">output-check <span style="color:var(--text-muted)">txt</span></div>
    <div style="border-top:0.5px solid var(--border); margin-top:6px; padding-top:6px; font-size:11px; color: var(--text-muted); padding-left:4px;">CUT-EDGE-01 ▸</div>
    <div style="margin-top:auto; border-top:0.5px solid var(--border); padding-top:8px; font-size:11px; color: var(--text-secondary); display:flex; flex-direction:column; gap:5px;">
      <label style="display:flex; align-items:center; gap:5px;"><input type="checkbox" checked style="width:13px;height:13px;">截图</label>
      <label style="display:flex; align-items:center; gap:5px;"><input type="checkbox" style="width:13px;height:13px;">只看关键</label>
    </div>
  </div>

  <div style="flex:1; min-width:0; display:flex; flex-direction:column; gap:8px;">
    <div style="flex:1; background: var(--surface-2); border: 0.5px solid var(--border); border-radius: var(--radius); display:flex; align-items:center; justify-content:center; position:relative; min-height: 200px;">
      <div style="color: var(--text-muted); text-align:center; font-size:13px;"><i class="ti ti-photo" style="font-size:32px; display:block; margin-bottom:6px;" aria-hidden="true"></i>03-editor.png</div>
      <div style="position:absolute; left:8px; top:50%; transform:translateY(-50%); width:26px;height:26px; border:0.5px solid var(--border-strong); border-radius:50%; display:flex;align-items:center;justify-content:center; background:var(--surface-1); color:var(--text-secondary);"><i class="ti ti-chevron-left" aria-hidden="true"></i></div>
      <div style="position:absolute; right:8px; top:50%; transform:translateY(-50%); width:26px;height:26px; border:0.5px solid var(--border-strong); border-radius:50%; display:flex;align-items:center;justify-content:center; background:var(--surface-1); color:var(--text-secondary);"><i class="ti ti-chevron-right" aria-hidden="true"></i></div>
      <div style="position:absolute; bottom:8px; left:50%; transform:translateX(-50%); font-size:11px; color:var(--text-muted); background:var(--surface-1); padding:2px 8px; border-radius:20px; border:0.5px solid var(--border);">← → 方向键切换 · 3 / 7</div>
    </div>

    <div style="background: var(--surface-2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px;">
      <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
        <span style="font-size:13px; font-weight:500;">03-editor</span>
        <span style="font-size:11px; background:var(--bg-success); color:var(--text-success); padding:2px 8px; border-radius:20px;">通过</span>
        <span style="font-size:11px; background:var(--bg-accent); color:var(--text-accent); padding:2px 8px; border-radius:20px;">★ 关键</span>
        <span style="font-size:11px; color:var(--text-muted); margin-left:auto;">screenshots</span>
      </div>
      <div style="font-size:12px; color: var(--text-secondary); line-height:1.6;">断言：进入剪辑器，新手引导已关、保留默认选区（起 00:46.4 / 止 03:31.5）</div>
    </div>

    <div style="display:flex; gap:6px;">
      <div style="flex:1; height:38px; background:var(--surface-1); border:0.5px solid var(--border); border-radius:6px;"></div>
      <div style="flex:1; height:38px; background:var(--surface-1); border:0.5px solid var(--border); border-radius:6px;"></div>
      <div style="flex:1; height:38px; background:var(--surface-2); border:2px solid var(--border-accent); border-radius:6px;"></div>
      <div style="flex:1; height:38px; background:var(--surface-1); border:0.5px solid var(--border); border-radius:6px;"></div>
      <div style="flex:1; height:38px; background:var(--surface-1); border:0.5px solid var(--border); border-radius:6px;"></div>
    </div>
  </div>

</div>
</div>
</body>
</html>
